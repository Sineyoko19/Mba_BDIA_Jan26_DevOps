version: 2

models:

  - name: gold_listings_analytics
    description: >
      Analyse détaillée des logements Airbnb incluant performance, prix et qualité perçue via les avis clients.
      Ce modèle sert à identifier les logements les plus performants en combinant métriques financières et satisfaction client.
    columns:
      - name: listing_id
        description: Identifiant unique du logement
        tests:
          - not_null
          - unique

      - name: room_type
        description: Catégorie du logement (entire home, private room, shared room)
        tests:
          - not_null

      - name: price
        description: Prix moyen par nuit en euros
        tests:
          - not_null

      - name: positive_rate_pct
        description: Indicateur de satisfaction client basé sur la proportion d'avis positifs (0-100)

      - name: price_per_review
        description: KPI de rentabilité implicite du logement (prix rapporté à l’engagement client)

  - name: gold_hosts_performance
    description: >
      Analyse de la performance des hôtes Airbnb basée sur leur portefeuille de logements et la satisfaction client générée.
      Permet d’identifier les hôtes les plus efficaces et ceux ayant un modèle plus professionnel ou individuel.
    columns:
      - name: host_id
        description: Identifiant unique de l'hôte
        tests:
          - not_null
          - unique

      - name: is_superhost
        description: Indique si l'hôte possède le statut Superhost Airbnb
        tests:
          - not_null

      - name: nb_listings
        description: Nombre total de logements gérés par l'hôte
        tests:
          - not_null

      - name: engagement_per_listing
        description: Niveau d’engagement moyen généré par logement (nombre de reviews / listing)

      - name: performance_index
        description: Indicateur composite de performance combinant prix et satisfaction client

  - name: gold_reviews_summary
    description: >
      Analyse de la distribution des sentiments des avis clients selon le type de logement.
      Permet d’identifier les segments de marché les plus appréciés ou les plus critiqués.
    columns:
      - name: room_type
        description: Type de logement proposé sur la plateforme
        tests:
          - not_null

      - name: sentiment
        description: Classification du sentiment exprimé dans les avis clients
        tests:
          - not_null
          - accepted_values:
              values: ['positive', 'negative', 'neutral']

      - name: sentiment_share_pct
        description: Part relative des sentiments au sein de chaque type de logement

  - name: gold_full_moon_impact
    description: >
      Analyse exploratoire visant à tester une hypothèse externe :
      l’impact potentiel des cycles lunaires sur la perception des logements Airbnb.
      Ce modèle a un caractère expérimental et statistique.
    columns:
      - name: is_near_full_moon
        description: Indicateur binaire signalant une période proche d'une pleine lune (±3 jours)
        tests:
          - not_null

      - name: sentiment
        description: Sentiment exprimé dans l'avis client
        tests:
          - not_null
          - accepted_values:
              values: ['positive', 'negative', 'neutral']

      - name: sentiment_share_pct
        description: Répartition des sentiments selon la période lunaire